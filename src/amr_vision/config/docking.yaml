mock_dock_camera:
  ros__parameters:
    image_width: 640
    image_height: 480
    horizontal_fov_deg: 70.0
    frame_id: camera_optical_frame
    publish_rate_hz: 15.0
    marker_id: 3
    marker_length_m: 0.20
    dictionary: DICT_4X4_50
    # Marker placement in the robot base frame (x forward, y left, z up).
    marker_forward_m: 2.0
    marker_left_m: 0.10
    marker_up_m: 0.0
    marker_yaw_deg: 0.0
    # Slowly close the gap to simulate the robot approaching the dock.
    approach_speed_mps: 0.15
    min_forward_m: 0.35

aruco_docking:
  ros__parameters:
    marker_id: 3
    marker_length_m: 0.20
    dictionary: DICT_4X4_50
    publish_debug_image: true
    default_horizontal_fov_deg: 70.0
    aligned_max_range_m: 0.6
    aligned_min_range_m: 0.15
    aligned_max_lateral_m: 0.03
    aligned_max_bearing_rad: 0.05
