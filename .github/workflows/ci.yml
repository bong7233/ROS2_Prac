name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  static-checks:
    name: Static checks
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check Python syntax
        run: |
          python3 -m py_compile \
            src/amr_bringup/launch/mock_robot.launch.py \
            src/amr_operator_ui/launch/operator_ui.launch.py \
            src/amr_sim/launch/gazebo_amr.launch.py \
            src/amr_tools/amr_tools/fault_scenario.py \
            src/amr_tools/amr_tools/health_report.py \
            src/amr_tools/amr_tools/report_model.py \
            src/amr_vision/amr_vision/aruco_compat.py \
            src/amr_vision/amr_vision/marker_docking.py \
            src/amr_vision/amr_vision/aruco_docking_node.py \
            src/amr_vision/amr_vision/mock_dock_camera_node.py \
            src/amr_vision/launch/docking_vision.launch.py \
            src/amr_docking/amr_docking/docking_controller.py \
            src/amr_docking/amr_docking/docking_controller_node.py \
            src/amr_docking/launch/docking_controller.launch.py \
            src/amr_docking/launch/dock_demo.launch.py \
            src/amr_docking/launch/dock_closed_loop.launch.py \
            src/amr_lidar_driver/amr_lidar_driver/scan_model.py \
            src/amr_lidar_driver/amr_lidar_driver/mock_lidar_driver_node.py \
            src/amr_lidar_driver/launch/mock_lidar.launch.py

      - name: Check XML, SDF, and xacro syntax
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import xml.etree.ElementTree as ET

          patterns = ("*.xml", "*.sdf", "*.urdf.xacro")
          checked = 0
          for pattern in patterns:
              for path in Path(".").rglob(pattern):
                  ET.parse(path)
                  checked += 1
                  print(path)
          print(f"checked {checked} XML-like files")
          PY

      - name: Run ROS-free unit tests
        run: |
          python3 -m venv /tmp/rosfree
          /tmp/rosfree/bin/pip install --quiet --upgrade pip
          /tmp/rosfree/bin/pip install --quiet pytest opencv-contrib-python-headless numpy
          ROOT=$PWD
          (cd src/amr_vision && /tmp/rosfree/bin/python -m pytest test -q)
          (cd src/amr_lidar_driver && /tmp/rosfree/bin/python -m pytest test -q)
          (cd src/amr_docking && PYTHONPATH="$ROOT/src/amr_vision" /tmp/rosfree/bin/python -m pytest test -q)
          (cd src/amr_tools && /tmp/rosfree/bin/python -m pytest test/test_report_model.py -q)

  ros2-build:
    name: ROS 2 Jazzy build
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enable Ubuntu universe repository
        run: |
          sudo apt-get update
          sudo apt-get install -y software-properties-common
          sudo add-apt-repository -y universe

      - name: Install ROS 2 apt source
        run: |
          sudo apt-get update
          sudo apt-get install -y curl
          export ROS_APT_SOURCE_VERSION=$(
            curl -s https://api.github.com/repos/ros-infrastructure/ros-apt-source/releases/latest \
              | grep -F '"tag_name"' \
              | awk -F\" '{print $4}'
          )
          . /etc/os-release
          curl -L -o /tmp/ros2-apt-source.deb \
            "https://github.com/ros-infrastructure/ros-apt-source/releases/download/${ROS_APT_SOURCE_VERSION}/ros2-apt-source_${ROS_APT_SOURCE_VERSION}.${VERSION_CODENAME}_all.deb"
          sudo dpkg -i /tmp/ros2-apt-source.deb

      - name: Install ROS 2 build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            python3-colcon-common-extensions \
            python3-rosdep \
            qt6-base-dev \
            qt6-tools-dev \
            qt6-tools-dev-tools \
            ros-jazzy-ros-base

      - name: Install workspace dependencies
        run: |
          sudo rosdep init || true
          rosdep update
          rosdep install --from-paths src --ignore-src -r -y --rosdistro jazzy

      - name: Build workspace
        shell: bash
        run: |
          source /opt/ros/jazzy/setup.bash
          colcon build \
            --symlink-install \
            --event-handlers console_direct+ \
            --cmake-args -DCMAKE_BUILD_TYPE=RelWithDebInfo

      - name: Run tests
        shell: bash
        run: |
          source /opt/ros/jazzy/setup.bash
          source install/setup.bash
          colcon test --event-handlers console_direct+
          colcon test-result --verbose
