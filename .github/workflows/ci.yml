name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  static-checks:
    name: Static checks
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check Python syntax
        run: |
          python3 -m py_compile \
            src/amr_bringup/launch/mock_robot.launch.py \
            src/amr_sim/launch/gazebo_amr.launch.py \
            src/amr_tools/amr_tools/fault_scenario.py \
            src/amr_tools/amr_tools/health_report.py

      - name: Check XML, SDF, and xacro syntax
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import xml.etree.ElementTree as ET

          patterns = ("*.xml", "*.sdf", "*.urdf.xacro")
          checked = 0
          for pattern in patterns:
              for path in Path(".").rglob(pattern):
                  ET.parse(path)
                  checked += 1
                  print(path)
          print(f"checked {checked} XML-like files")
          PY

  ros2-build:
    name: ROS 2 Jazzy build
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enable Ubuntu universe repository
        run: |
          sudo apt-get update
          sudo apt-get install -y software-properties-common
          sudo add-apt-repository -y universe

      - name: Install ROS 2 apt source
        run: |
          sudo apt-get update
          sudo apt-get install -y curl
          export ROS_APT_SOURCE_VERSION=$(
            curl -s https://api.github.com/repos/ros-infrastructure/ros-apt-source/releases/latest \
              | grep -F '"tag_name"' \
              | awk -F\" '{print $4}'
          )
          . /etc/os-release
          curl -L -o /tmp/ros2-apt-source.deb \
            "https://github.com/ros-infrastructure/ros-apt-source/releases/download/${ROS_APT_SOURCE_VERSION}/ros2-apt-source_${ROS_APT_SOURCE_VERSION}.${VERSION_CODENAME}_all.deb"
          sudo dpkg -i /tmp/ros2-apt-source.deb

      - name: Install ROS 2 build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            python3-colcon-common-extensions \
            python3-rosdep \
            ros-jazzy-ros-base

      - name: Install workspace dependencies
        run: |
          sudo rosdep init || true
          rosdep update
          rosdep install --from-paths src --ignore-src -r -y --rosdistro jazzy

      - name: Build workspace
        shell: bash
        run: |
          source /opt/ros/jazzy/setup.bash
          colcon build \
            --symlink-install \
            --event-handlers console_direct+ \
            --cmake-args -DCMAKE_BUILD_TYPE=RelWithDebInfo

      - name: Run tests
        shell: bash
        run: |
          source /opt/ros/jazzy/setup.bash
          source install/setup.bash
          colcon test --event-handlers console_direct+
          colcon test-result --verbose
